<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍞 Bakery Map</title>
    <link rel="stylesheet" href="https://cache.amap.com/lbs/static/main1119.css"/>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="search-bar">
        <div class="logo">🍞 Bakery Map</div>
        <input type="text" id="searchInput" placeholder="搜索面包店、甜品...">
        <button id="searchBtn">🔍</button>
        <button id="aiRouteBtn">🤖 AI规划路线</button>
    </div>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h3>🏪 附近好店</h3>
            <button id="toggleSidebar">◀</button>
        </div>
        <div class="shop-list" id="shopList"></div>
    </div>

    <div id="mapContainer"></div>

    <div class="ai-panel" id="aiPanel">
        <div class="ai-header">
            <h3>🤖 AI 路线规划</h3>
            <button id="closeAiPanel">✕</button>
        </div>
        <div class="ai-content">
            <p>告诉我你的需求，我帮你规划最优打卡路线！</p>
            <textarea id="aiPrompt" placeholder="例如：我想在2小时内打卡3家面包店，预算100元，喜欢日式面包..."></textarea>
            <button id="generateRoute">生成路线</button>
            <div id="routeResult"></div>
        </div>
    </div>

    <div class="modal" id="shopModal">
        <div class="modal-content">
            <button class="modal-close" id="modalClose">✕</button>
            <div id="modalBody"></div>
        </div>
    </div>

    <script src="https://webapi.amap.com/maps?v=2.0&key=7506f5ee71046b5c49468e132a5fbc3e&plugin=AMap.Scale,AMap.ToolBar"></script>
    <script src="data.js"></script>
    <script src="route-planner.js"></script>
    <script src="app.js"></script>
</body>
</html>
